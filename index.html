        *{margin:0;padding:0;box-sizing:border-box;font-family:system-ui,'Segoe UI',sans-serif;}
        body{background:linear-gradient(135deg,#0f172a,#1e1b4b);min-height:100vh;display:flex;justify-content:center;align-items:center;padding:20px;}
        .card{max-width:650px;width:100%;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);border-radius:48px;padding:28px 24px 36px;box-shadow:0 25px 45px -12px rgba(0,0,0,0.5);border:1px solid rgba(255,255,255,0.15);position:relative;}
        .watermark{position:absolute;bottom:15px;right:20px;font-size:12px;color:rgba(255,255,255,0.2);font-weight:bold;letter-spacing:2px;pointer-events:none;}
        .badge{display:inline-block;background:#4f46e5;padding:6px 16px;border-radius:40px;font-size:0.75rem;font-weight:600;color:white;margin-bottom:20px;}
        h1{font-size:2rem;font-weight:700;background:linear-gradient(to right,#c7d2fe,#a78bfa);background-clip:text;-webkit-background-clip:text;color:transparent;margin-bottom:8px;}
        .sub{color:#a5b4fc;font-size:0.85rem;margin-bottom:32px;border-left:3px solid #4f46e5;padding-left:14px;}
        .credit{background:rgba(79,70,229,0.2);border-radius:40px;padding:6px 14px;font-size:0.75rem;display:inline-block;margin-bottom:16px;color:#c7d2fe;border:1px solid rgba(79,70,229,0.5);}
        .input-group{display:flex;flex-direction:column;gap:12px;margin-bottom:28px;}
        label{font-weight:600;color:#e2e8f0;font-size:0.85rem;}
        input{background:#1e293b;border:1px solid #334155;padding:14px 20px;border-radius:48px;font-size:1rem;color:white;outline:none;}
        input:focus{border-color:#818cf8;box-shadow:0 0 0 3px rgba(79,70,229,0.3);}
        button{background:linear-gradient(95deg,#4f46e5,#7c3aed);border:none;padding:14px;border-radius:48px;font-weight:700;font-size:1rem;color:white;cursor:pointer;transition:0.2s;margin-top:8px;}
        button:hover{transform:scale(1.01);background:linear-gradient(95deg,#6366f1,#8b5cf6);box-shadow:0 8px 20px -8px #4f46e5;}
        .result-card{background:#0f172a;border-radius:32px;padding:20px;margin-top:28px;border:1px solid #334155;}
        .result-title{display:flex;align-items:center;gap:10px;font-weight:700;color:#cbd5e1;border-bottom:1px solid #334155;padding-bottom:12px;margin-bottom:18px;}
        .data-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px dashed #1e293b;}
        .data-label{font-weight:500;color:#94a3b8;}
        .data-value{font-weight:600;color:#e0e7ff;text-align:right;word-break:break-word;max-width:60%;}
        .info-note{font-size:0.7rem;color:#5b6e8c;text-align:center;margin-top:20px;background:#1e293b;padding:10px;border-radius:24px;}
        .signature{font-size:0.8rem;color:#a78bfa;text-align:center;margin-top:20px;font-weight:500;letter-spacing:1px;}
        @media (max-width:480px){.card{padding:20px 18px;}.data-row{flex-direction:column;gap:4px;}.data-value{text-align:left;max-width:100%;}}
    </style>
</head>

    function parseNIK(nik){
        if(!nik || nik.length!==16 || !/^\d+$/.test(nik)) return {ok:false, pesan:"NIK harus 16 digit angka!"};
        let kodeProv = nik.substr(0,2);
        let kodeKab = nik.substr(0,4);
        let kodeKec = nik.substr(0,6);
        let lahir = nik.substr(6,6);
        let hari = parseInt(lahir.substr(0,2),10);
        let bulan = parseInt(lahir.substr(2,2),10);
        let tahun = parseInt(lahir.substr(4,2),10);
        let kelamin = (hari>40) ? "Perempuan" : "Laki-laki";
        if(hari>40) hari -= 40;
        let tahunFull = (tahun>=0 && tahun<=23) ? 2000+tahun : 1900+tahun;
        let tglValid = (hari>=1 && hari<=31 && bulan>=1 && bulan<=12);
        let tglLahir = tglValid ? `${hari.toString().padStart(2,'0')}/${bulan.toString().padStart(2,'0')}/${tahunFull}` : "Format tanggal salah";
        let namaProv = provinsi[kodeProv] || "Tidak diketahui";
        let namaKab = kabupaten[kodeKab] || "Tidak diketahui";
        let namaKec = kecamatan[kodeKec] || "Kecamatan tidak terdata";
        return {
            ok:true,
            prov:namaProv,
            kabkot:namaKab,
            kec:namaKec,
            gender:kelamin,
            tgl:tglLahir
        };
    }

            return;
        }

                <div class="data-row"><span class="data-label">📍 Provinsi</span><span class="data-value">${hasil.prov}</span></div>
                <div class="data-row"><span class="data-label">🏙️ Kabupaten/Kota</span><span class="data-value">${hasil.kabkot}</span></div>

                <div class="data-row"><span class="data-label">🎂 Tanggal Lahir</span><span class="data-value">${hasil.tgl}</span></div>
                <div class="data-row"><span class="data-label">⚥ Jenis Kelamin</span><span class="data-value">${hasil.gender}</span></div>
                <div class="info-note">ℹ️ Data berdasarkan kode wilayah & tanggal lahir dalam NIK.</div>
            </div>
        `;
